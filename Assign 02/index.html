<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebQuiz - Interactive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-primary">WebQuiz</h1>
            <div>
                <button id="themeToggle" class="btn btn-outline-secondary">🌙 Dark</button>
                <button onclick="restartQuiz()" class="btn btn-outline-danger ms-2">Restart</button>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressContainer" class="mb-4">
            <div class="progress-stacked" style="height: 30px;">
                <!-- Segments added by JS -->
            </div>
        </div>

        <!-- Question Card -->
        <div class="card shadow">
            <div class="card-header d-flex justify-content-between">
                <span id="questionNumber" class="fw-bold"></span>
                <span id="timer" class="badge bg-danger fs-5">30</span>
            </div>
            <div class="card-body">
                <h5 id="questionText" class="card-title"></h5>
                <div id="options" class="list-group mt-3">
                    <!-- Options added by JS -->
                </div>
            </div>
            <div class="card-footer text-end">
                <button id="nextBtn" class="btn btn-primary" disabled>Next Question</button>
            </div>
        </div>

        <!-- Result Modal -->
        <div class="modal fade" id="resultModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Quiz Completed!</h5>
                    </div>
                    <div class="modal-body text-center">
                        <h2 id="scoreText" class="display-4"></h2>
                        <p id="scoreDetail"></p>
                        <button onclick="downloadPDF()" class="btn btn-success mt-3">Download Results as PDF</button>
                    </div>
                    <div class="modal-footer">
                        <button onclick="restartQuiz()" class="btn btn-secondary">Try Again</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
